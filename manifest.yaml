version: 0.0.1
type: plugin
author: shaba
name: ndjson
repo: https://github.com/shaba/dify-datasource-ndjson
label:
  en_US: NDJSON dump
  ru_RU: NDJSON-дамп
description:
  en_US: "Load a bulk NDJSON dump (optionally via a JSON manifest of gzipped exports) into a Dify Knowledge base, one document per record. Generic field mapping; built for manpages.altlinux.team-style exports."
  ru_RU: "Загрузка bulk-дампа NDJSON (опц. через JSON-манифест gzip-экспортов) в базу знаний Dify — по одному документу на запись. Настраиваемый маппинг полей; заточено под экспорты вида manpages.altlinux.team."
icon: icon.svg
tags:
  - rag
resource:
  memory: 268435456
  permission:
    model:
      enabled: false
    node:
      enabled: false
plugins:
  datasources:
    - provider/ndjson.yaml
meta:
  version: 0.0.1
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
  minimum_dify_version: 1.9.0
created_at: "2026-07-03T00:00:00Z"
