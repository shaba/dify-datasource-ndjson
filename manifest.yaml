version: 0.0.5
type: plugin
author: shaba
name: ndjson
repo: https://github.com/shaba/dify-datasource-ndjson
label:
  en_US: NDJSON dump
  ru_RU: NDJSON-дамп
description:
  en_US: "Load a bulk NDJSON (JSON Lines) dump — plain or via a JSON manifest of compressed exports — into a Dify Knowledge base, one document per record, with configurable field mapping."
  ru_RU: "Загрузка bulk-дампа NDJSON (JSON Lines) — напрямую или через JSON-манифест сжатых экспортов — в базу знаний Dify: по одному документу на запись, с настраиваемым маппингом полей."
icon: icon.svg
tags:
  - rag
resource:
  memory: 1073741824
  permission:
    model:
      enabled: false
    node:
      enabled: false
plugins:
  datasources:
    - provider/ndjson.yaml
meta:
  version: 0.0.5
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
  minimum_dify_version: 1.9.0
created_at: "2026-07-03T00:00:00Z"
